
<style>
#erd svg { width: 100% !important; }
#erd svg.erDiagram .divider path { stroke-opacity: 0.5; }
#erd svg.erDiagram .row-rect-odd path,
#erd svg.erDiagram .row-rect-odd rect,
#erd svg.erDiagram .row-rect-even path,
#erd svg.erDiagram .row-rect-even rect { stroke: none !important; }
</style>
<div id="erd" style="padding: 1rem 0;"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '12px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#1e2a3a' : '#E6F1FB',
    primaryTextColor: dark ? '#c2c0b6' : '#0C447C',
    primaryBorderColor: dark ? '#378ADD' : '#185FA5',
    secondaryColor: dark ? '#1a2e24' : '#E1F5EE',
    tertiaryColor: dark ? '#2a1f3a' : '#EEEDFE',
  },
  er: { diagramPadding: 20, layoutDirection: 'TB', minEntityWidth: 100, minEntityHeight: 75, entityPadding: 15, useMaxWidth: true }
});

const diagram = `erDiagram
  USERS {
    int user_id PK
    varchar full_name
    varchar email
    varchar password_hash
    varchar role
    datetime created_at
  }
  RESUMES {
    int resume_id PK
    int user_id FK
    varchar file_path
    text raw_text
    datetime uploaded_at
  }
  SKILLS {
    int skill_id PK
    varchar skill_name
    varchar category
  }
  USER_SKILLS {
    int user_skill_id PK
    int user_id FK
    int skill_id FK
    varchar proficiency
  }
  JOBS {
    int job_id PK
    varchar title
    varchar company
    varchar location
    text description
    varchar job_url
    varchar source
    datetime fetched_at
  }
  JOB_SKILLS {
    int job_skill_id PK
    int job_id FK
    int skill_id FK
    bit is_required
  }
  JOB_MATCHES {
    int match_id PK
    int user_id FK
    int job_id FK
    decimal match_score
    text missing_skills
    datetime matched_at
  }
  PROPOSALS {
    int proposal_id PK
    int user_id FK
    int job_id FK
    text proposal_text
    varchar status
    datetime created_at
  }
  NEGOTIATIONS {
    int negotiation_id PK
    int user_id FK
    int job_id FK
    json conversation_log
    datetime started_at
  }

  USERS ||--o{ RESUMES : "uploads"
  USERS ||--o{ USER_SKILLS : "has"
  SKILLS ||--o{ USER_SKILLS : "tagged in"
  SKILLS ||--o{ JOB_SKILLS : "required by"
  JOBS ||--o{ JOB_SKILLS : "requires"
  USERS ||--o{ JOB_MATCHES : "receives"
  JOBS ||--o{ JOB_MATCHES : "matched to"
  USERS ||--o{ PROPOSALS : "generates"
  JOBS ||--o{ PROPOSALS : "has"
  USERS ||--o{ NEGOTIATIONS : "simulates"
  JOBS ||--o{ NEGOTIATIONS : "used in"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
